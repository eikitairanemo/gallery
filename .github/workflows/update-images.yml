name: Update Images JSON

on:
  push:
    branches:
      - main
    paths:
      - "images/**"
      - ".github/workflows/update-images.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate images.json
        run: |
          python3 <<'PY'
          import json
          import os
          import re

          image_dir = "images"
          extensions = {".jpg", ".jpeg", ".png", ".webp", ".gif", ".avif"}

          def image_number(filename):
              match = re.search(r"(\d+)", filename)
              return int(match.group(1)) if match else 0

          images = []

          for filename in os.listdir(image_dir):
              filepath = os.path.join(image_dir, filename)

              if not os.path.isfile(filepath):
                  continue

              extension = os.path.splitext(filename)[1].lower()

              if extension not in extensions:
                  continue

              images.append({
                  "name": filename,
                  "path": f"images/{filename}"
              })

          images.sort(
              key=lambda image: image_number(image["name"]),
              reverse=True
          )

          with open("images.json", "w", encoding="utf-8") as file:
              json.dump(images, file, ensure_ascii=False, indent=2)

          print(f"{len(images)} images written")
          PY

      - name: Commit images.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add images.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update images.json"
          git push
