name: Update Images JSON

on:
  push:
    branches:
      - main
    paths:
      - "images/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate images.json
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone

          image_dir = "images"
          allowed_extensions = {
              ".jpg",
              ".jpeg",
              ".png",
              ".webp",
              ".gif",
              ".avif"
          }

          def natural_number(filename):
              match = re.search(r"(\d+)", filename)
              return int(match.group(1)) if match else -1

          images = []

          if os.path.isdir(image_dir):
              for filename in os.listdir(image_dir):
                  filepath = os.path.join(image_dir, filename)

                  if not os.path.isfile(filepath):
                      continue

                  extension = os.path.splitext(filename)[1].lower()

                  if extension not in allowed_extensions:
                      continue

                  modified_time = os.path.getmtime(filepath)

                  images.append({
                      "name": filename,
                      "path": filepath.replace("\\", "/"),
                      "created": datetime.fromtimestamp(
                          modified_time,
                          timezone.utc
                      ).isoformat()
                  })

          # IMG00010.jpg → IMG00009.jpg の順に並べる
          images.sort(
              key=lambda image: natural_number(image["name"]),
              reverse=True
          )

          with open("images.json", "w", encoding="utf-8") as file:
              json.dump(
                  images,
                  file,
                  ensure_ascii=False,
                  indent=2
              )

          print(f"{len(images)} images written to images.json")
          PY

      - name: Commit images.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add images.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update images.json"
          git push
